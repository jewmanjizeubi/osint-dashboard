<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>OSINT Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="layout">
        <header>
            <div class="topbar-logo">OSINT Dashboard</div>
            <div class="topbar-clock">
                <span id="clock"></span>
            </div>
            <div class="topbar-status">
                <span class="pulse-dot"></span>
                <span>SERVEUR EN LIGNE</span>
            </div>
            <button id="btn-toggle-sidebar">☰</button>
        </header>

        <aside>
            <h2>Cibles <span id="compteur-cibles"></span></h2>
            <input type="text" id="search" placeholder="Rechercher une cible...">
            <ul id="liste-cibles"></ul>
            <button id="btn-nouvelle-cible">Nouvelle cible</button>
        </aside>

        <main>
            <h2>Monitoring</h2>
            <div id="breadcrumb">
                <span>OSINT</span>
                <span class="bc-sep"> / </span>
                <span id="bc-cible">—</span>
                <span class="bc-sep"> / </span>
                <span id="bc-cat">—</span>
            </div>
            <section class="monitoring">
                <div class="metric-card" title="Utilisation du processeur">
                    <span>CPU</span>
                    <span id="cpu-val">0%</span>
                </div>
                <div class="metric-card" title="Utilisation de la RAM">
                    <span>RAM</span>
                    <span id="ram-val">0%</span>
                </div>
                <div class="metric-card" title="Latence du serveur">
                    <span>Latence</span>
                    <span id="latence-val">0ms</span>
                </div>
                <div class="metric-card" title="Uptime serveur">
                    <span>Uptime</span>
                    <span id="uptime-val">0%</span>
                </div>
            </section>
            <div class="ecg-card">
                <span>CPU</span>
                <canvas id="ecg"></canvas>
            </div>

            <section class="donnees">
                <h2>Données</h2>
                <table id="table-donnees">
                    <tr id="no-data">
                        <td colspan="2">Sélectionnez une cible pour afficher ses données</td>
                    </tr>
                </table>
            </section>
        </main>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-box">
            <h2>Nouvelle cible</h2>
            <button id="modal-close">✕</button>
            <form id="form-cible">
                <label>Nom</label>
                <input type="text" id="input-nom" placeholder="Dupont" required>

                <label>Prénom</label>
                <input type="text" id="input-prenom" placeholder="Jean" required>

                <label>Email</label>
                <input type="email" id="input-email" placeholder="jean@example.com">

                <label>Téléphone</label>
                <input type="text" id="input-tel" placeholder="06 00 00 00 00">

                <button type="submit">Ajouter</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='clock.js') }}"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>

</html>
