<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FRIDAY — Authentification</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <!--<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">-->
    <link rel="stylesheet" href="login.css">
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="scanline"></div>

<header>
    <div class="topbar-logo">F·R·I·D·A·Y</div>
    <div class="topbar-clock"><span id="clock"></span></div>
    <div class="topbar-status">
        <span class="pulse-dot"></span>
        <span>SERVEUR EN LIGNE</span>
    </div>
</header>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="orb-wrap">
    <canvas id="orb-canvas" width="220" height="220"></canvas>

    <div class="login-panel">
        <div class="login-title">AUTHENTIFICATION</div>

        {% if error %}
        <div class="login-error visible">IDENTIFIANTS INCORRECTS</div>
        {% endif %}

        <form method="POST">
            <div class="field">
                <label>IDENTIFIANT</label>
                <input type="text" name="username" autocomplete="off" autofocus>
            </div>
            <div class="field">
                <label>MOT DE PASSE</label>
                <input type="password" name="password">
            </div>
            <button type="submit" class="btn-login">ACCÈS SYSTÈME</button>
        </form>
    </div>
</div>

<!--<script src="{{ url_for('static', filename='login.js') }}"></script>-->
<script src="login.js"></script>
</body>
</html>
