<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>OSINT Dashboard - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="layout-login">
        <header>
            <div class="topbar-logo">OSINT Dashboard</div>
            <div class="topbar-clock">
                <span id="clock"></span>
            </div>
            <div class="topbar-status">
                <span class="pulse-dot"></span>
                <span>SERVEUR EN LIGNE</span>
            </div>
        </header>
        <main>
            <div id="login-box">
                <h2>Connexion</h2>
                <form method="POST">
                    <label>Identifiant</label>
                    <input type="text" name="username" placeholder="" autocomplete="username" required>

                    <label>Mot de passe</label>
                    <input type="password" name="password" placeholder="" autocomplete="current-password" required>

                    {% if error %}
                    <div class="login-error visible">Identifiants incorrects</div>
                    {% else %}
                    <div class="login-error"></div>
                    {% endif %}

                    <button type="submit">Connexion</button>
                </form>
            </div>
        </main>
    </div>
    <script src="{{ url_for('static', filename='clock.js') }}"></script>
</body>

</html>
